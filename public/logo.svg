      <ellipse cx="62" cy="50" rx="9" ry="7" transform="rotate(-20 62 50)"/>
      <rect x="42" y="28" width="3" height="32" rx="1.5"/>
      <rect x="69" y="20" width="3" height="32" rx="1.5"/>
