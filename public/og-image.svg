<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0f0a1a"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#D946EF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative orbs -->
  <circle cx="100" cy="100" r="150" fill="#8B5CF6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#D946EF" opacity="0.1"/>
  <circle cx="900" cy="150" r="100" fill="#8B5CF6" opacity="0.08"/>

  <!-- Logo icon (centered, larger) -->
  <g transform="translate(450, 120) scale(2.5)" filter="url(#glow)">
    <!-- Message bubble -->
    <path
      d="M85 15H15C9 15 5 19 5 25v45c0 6 4 10 10 10h15v15c0 1.5 1.8 2.3 3 1.3L50 80h35c6 0 10-4 10-10V25c0-6-4-10-10-10z"
      fill="url(#iconGrad)"
    />
    <!-- Music note -->
    <g fill="white">
      <ellipse cx="35" cy="58" rx="9" ry="7" transform="rotate(-20 35 58)"/>
      <ellipse cx="62" cy="50" rx="9" ry="7" transform="rotate(-20 62 50)"/>
      <rect x="42" y="28" width="3" height="32" rx="1.5"/>
      <rect x="69" y="20" width="3" height="32" rx="1.5"/>
      <path d="M43.5 28 L72 20 L72 26 L43.5 34 Z"/>
    </g>
  </g>

  <!-- App name -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="white">
    Attune
  </text>

  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">
    Your Personal AI Relationship Coach
  </text>

  <!-- Subtitle -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">
    Build stronger connections with expert-backed guidance
  </text>
</svg>
